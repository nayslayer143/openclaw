name: iFauxto
options:
  bundleIdPrefix: com.ifauxto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

schemes:
  iFauxto:
    build:
      targets:
        iFauxto: all
        iFauxtoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - iFauxtoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  iFauxto:
    type: application
    platform: iOS
    sources:
      - path: iFauxto
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ifauxto.app
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: iFauxto/Resources/Info.plist
    info:
      path: iFauxto/Resources/Info.plist
      properties:
        CFBundleDisplayName: iFauxto
        CFBundleName: iFauxto
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSPhotoLibraryUsageDescription: "iFauxto needs access to your Photos library to organize your photos."
        NSPhotoLibraryAddUsageDescription: "iFauxto needs permission to add photos."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    dependencies:
      - sdk: libsqlite3.tbd
    entitlements:
      path: iFauxto/iFauxto.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ifauxto.app
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.ifauxto.app"
        com.apple.developer.icloud-container-development-container-identifiers:
          - iCloud.com.ifauxto.app

  iFauxtoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iFauxtoTests
    dependencies:
      - target: iFauxto
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ifauxto.tests
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: YES
