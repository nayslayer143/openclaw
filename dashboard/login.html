<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    border: 1px solid #222;
    padding: 48px;
    width: 360px;
    text-align: center;
  }
  .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 3px; color: #fff; margin-bottom: 8px; }
  .sub  { font-size: 0.7rem; color: #444; margin-bottom: 40px; letter-spacing: 1px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    border: 1px solid #333;
    background: #111;
    color: #ccc;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 12px;
  }
  .btn:hover { border-color: #ff4500; color: #fff; }
  .btn svg { flex-shrink: 0; }
  .divider { font-size: 0.65rem; color: #333; margin: 20px 0; }
  .err { font-size: 0.75rem; color: #f44336; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">OPENCLAW</div>
  <div class="sub">OPERATIONS DASHBOARD</div>

  <a class="btn" href="/auth/github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    Sign in with GitHub
  </a>

  <div id="err" class="err"></div>

  <script>
    const p = new URLSearchParams(location.search);
    if (p.get('error')) document.getElementById('err').textContent = decodeURIComponent(p.get('error'));
  </script>
</div>
</body>
</html>
