<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GONZOCLAW — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'JetBrains Mono', monospace;
    background: #060606;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    border: 1px solid rgba(232,104,0,0.2);
    padding: 48px;
    width: 360px;
    text-align: center;
  }
  .logo {
    font-size: 1.2rem; font-weight: 900; letter-spacing: 8px;
    color: #ff7c1a;
    text-shadow: 0 0 18px rgba(255,124,26,0.55);
    margin-bottom: 8px;
  }
  .sub { font-size: 0.6rem; color: #555; margin-bottom: 36px; letter-spacing: 2px; }
  .field {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #333;
    background: #111;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field:focus { border-color: #e86800; }
  .btn {
    width: 100%;
    padding: 14px 20px;
    border: 1px solid #e86800;
    background: transparent;
    color: #e86800;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn:hover { background: #e86800; color: #060606; }
  .err { font-size: 0.7rem; color: #ff002e; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">GONZOCLAW</div>
  <div class="sub">OPERATIONS DASHBOARD</div>

  <form action="/auth/password" method="POST">
    <input class="field" type="password" name="password" placeholder="password" autofocus>
    <button class="btn" type="submit">ENTER</button>
  </form>

  <div id="err" class="err"></div>

  <script>
    const p = new URLSearchParams(location.search);
    if (p.get('error')) document.getElementById('err').textContent = decodeURIComponent(p.get('error'));
  </script>
</div>
</body>
</html>
