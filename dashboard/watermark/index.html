<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDF Watermark</title>
<link rel="stylesheet" href="/watermark/static/styles.css" />
</head>
<body>
<header>
  <h1>PDF Watermark</h1>
  <p class="tag">Drop a logo on every page. All processing stays in your browser.</p>
</header>

<main>
  <section class="step" id="step-files">
    <div class="row">
      <label class="filebox">
        <span class="label">1. PDF</span>
        <input type="file" id="pdf-input" accept="application/pdf" />
        <span class="filename" id="pdf-name">no file</span>
      </label>
      <label class="filebox">
        <span class="label">2. Logo (PNG / JPG)</span>
        <input type="file" id="logo-input" accept="image/png,image/jpeg" />
        <span class="filename" id="logo-name">no file</span>
      </label>
    </div>
  </section>

  <section class="step hidden" id="step-place">
    <div class="toolbar">
      <button id="prev-page">&larr;</button>
      <span id="page-label">page 1 / 1</span>
      <button id="next-page">&rarr;</button>
      <span class="sep"></span>
      <label class="check"><input type="checkbox" id="apply-all" checked> apply to all pages</label>
      <span class="sep"></span>
      <button id="reset-page" title="Reset this page's override">reset page</button>
      <span class="hint">Drag on the page to draw the logo box, or drag/resize an existing box.</span>
    </div>
    <div class="stage" id="stage">
      <canvas id="pdf-canvas"></canvas>
      <div id="overlay">
        <div id="logo-box" class="hidden">
          <img id="logo-img" alt="" draggable="false" />
          <div class="handle" data-dir="nw"></div>
          <div class="handle" data-dir="ne"></div>
          <div class="handle" data-dir="sw"></div>
          <div class="handle" data-dir="se"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="step hidden" id="step-download">
    <button id="download-btn" class="primary">Download watermarked PDF</button>
    <span id="status"></span>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script type="module" src="/watermark/static/app.js"></script>
</body>
</html>
